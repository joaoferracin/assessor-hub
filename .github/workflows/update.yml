name: 🔄 Atualizar AssessorHub

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ▶️ Rodar script
        env:
          BRAPI_TOKEN:  ${{ secrets.BRAPI_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python update_hub.py

      - name: 📤 Publicar index.html
        run: |
          git config user.name  "AssessorHub Bot"
          git config user.email "bot@assessorhub.local"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Hub atualizado — $(date +'%d/%m/%Y %H:%M')"
          git push
